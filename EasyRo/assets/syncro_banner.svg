<svg viewBox="0 0 1200 300" fill="none" xmlns="http://www.w3.org/2000/svg">

  <!-- Background -->
  <rect width="1200" height="300" fill="#0f1923"/>

  <!-- Grid texture -->
  <line x1="0" y1="60" x2="1200" y2="60" stroke="#1a2a3a" stroke-width="0.5"/>
  <line x1="0" y1="120" x2="1200" y2="120" stroke="#1a2a3a" stroke-width="0.5"/>
  <line x1="0" y1="180" x2="1200" y2="180" stroke="#1a2a3a" stroke-width="0.5"/>
  <line x1="0" y1="240" x2="1200" y2="240" stroke="#1a2a3a" stroke-width="0.5"/>
  <line x1="60" y1="0" x2="60" y2="300" stroke="#1a2a3a" stroke-width="0.5"/>
  <line x1="120" y1="0" x2="120" y2="300" stroke="#1a2a3a" stroke-width="0.5"/>
  <line x1="180" y1="0" x2="180" y2="300" stroke="#1a2a3a" stroke-width="0.5"/>
  <line x1="240" y1="0" x2="240" y2="300" stroke="#1a2a3a" stroke-width="0.5"/>
  <line x1="300" y1="0" x2="300" y2="300" stroke="#1a2a3a" stroke-width="0.5"/>
  <line x1="360" y1="0" x2="360" y2="300" stroke="#1a2a3a" stroke-width="0.5"/>
  <line x1="420" y1="0" x2="420" y2="300" stroke="#1a2a3a" stroke-width="0.5"/>
  <line x1="480" y1="0" x2="480" y2="300" stroke="#1a2a3a" stroke-width="0.5"/>
  <line x1="540" y1="0" x2="540" y2="300" stroke="#1a2a3a" stroke-width="0.5"/>
  <line x1="600" y1="0" x2="600" y2="300" stroke="#1a2a3a" stroke-width="0.5"/>
  <line x1="660" y1="0" x2="660" y2="300" stroke="#1a2a3a" stroke-width="0.5"/>
  <line x1="720" y1="0" x2="720" y2="300" stroke="#1a2a3a" stroke-width="0.5"/>
  <line x1="780" y1="0" x2="780" y2="300" stroke="#1a2a3a" stroke-width="0.5"/>
  <line x1="840" y1="0" x2="840" y2="300" stroke="#1a2a3a" stroke-width="0.5"/>
  <line x1="900" y1="0" x2="900" y2="300" stroke="#1a2a3a" stroke-width="0.5"/>
  <line x1="960" y1="0" x2="960" y2="300" stroke="#1a2a3a" stroke-width="0.5"/>
  <line x1="1020" y1="0" x2="1020" y2="300" stroke="#1a2a3a" stroke-width="0.5"/>
  <line x1="1080" y1="0" x2="1080" y2="300" stroke="#1a2a3a" stroke-width="0.5"/>
  <line x1="1140" y1="0" x2="1140" y2="300" stroke="#1a2a3a" stroke-width="0.5"/>

  <!-- Logo mark — EasyRo ile aynı konum/boyut oranı -->
  <rect x="80" y="70" width="100" height="100" rx="18" fill="#e8621a"/>
  <rect x="60" y="50" width="100" height="100" rx="18" fill="#162030"/>
  <rect x="84" y="74" width="30" height="30" rx="6" fill="#e8621a"/>

  <!-- SyncRo text -->
  <text x="240" y="175" font-family="Space Grotesk, sans-serif" font-size="90" font-weight="600" letter-spacing="8" fill="#ffffff">Sync</text>
  <text x="490" y="175" font-family="Space Grotesk, sans-serif" font-size="90" font-weight="400" letter-spacing="8" fill="#e8621a">Ro</text>

  <!-- Sağ köşe accent -->
  <rect x="1110" y="20" width="50" height="50" rx="12" fill="#e8621a" opacity="0.08"/>
  <rect x="1120" y="10" width="50" height="50" rx="12" fill="#e8621a" opacity="0.12"/>
  <rect x="1132" y="24" width="16" height="16" rx="4" fill="#e8621a" opacity="0.6"/>
</svg>
